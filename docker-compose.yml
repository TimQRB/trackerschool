services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: safemektep
      POSTGRES_PASSWORD: safemektep
      POSTGRES_DB: safemektep
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safemektep"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://safemektep:safemektep@db:5432/safemektep
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-prod
      ADMIN_EMAIL: admin@safemektep.kz
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app

  gateway:
    build: ./backend
    command: python -m gateway.main
    environment:
      DATABASE_URL: postgresql+psycopg://safemektep:safemektep@db:5432/safemektep
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-prod
      REG_PORT: "13000"
      SVC_PORT: "13001"
      PUBLIC_HOST: gateway
      PUBLIC_SVC_PORT: "13001"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    ports:
      - "13000:13000"
      - "13001:13001"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
